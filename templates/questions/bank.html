{% extends "base.html" %}
{% block title %}Question Bank{% endblock %}
{% block page_title %}Question Bank{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <div class="d-flex gap-2">
        <input type="text" class="form-control form-control-sm" id="searchQ" placeholder="Search questions…" oninput="filterQ()" style="width:200px;">
        <select class="form-select form-select-sm" id="typeFilter" onchange="filterQ()" style="width:130px;">
            <option value="">All Types</option>
            <option value="mcq">MCQ</option>
            <option value="coding">Coding</option>
        </select>
        <select class="form-select form-select-sm" id="diffFilter" onchange="filterQ()" style="width:130px;">
            <option value="">All Levels</option>
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>
    </div>
    <button class="btn-primary-custom" onclick="openCreate()" style="font-size:.875rem;padding:9px 18px;border-radius:10px;">
        <i class="fas fa-plus me-2"></i>Add Question
    </button>
</div>

<div id="qTable"><div class="text-center py-5"><i class="fas fa-spinner fa-spin fa-2x text-muted"></i></div></div>

<!-- Create/Edit Modal -->
<div class="modal fade" id="qModal" tabindex="-1">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-bold" id="qModalTitle">Add Question</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="row g-3">
            <div class="col-12">
                <label class="form-label fw-semibold">Question Text *</label>
                <textarea class="form-control" id="q_text" rows="3" placeholder="Enter the question…"></textarea>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Type</label>
                <select class="form-select" id="q_type" onchange="toggleQFields()">
                    <option value="mcq">MCQ</option>
                    <option value="coding">Coding</option>
                </select>
            </div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Difficulty</label>
                <select class="form-select" id="q_diff">
                    <option value="easy">Easy</option>
                    <option value="medium">Medium</option>
                    <option value="hard">Hard</option>
                </select>
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Marks</label>
                <input type="number" class="form-control" id="q_marks" value="1" min="1">
            </div>
            <div class="col-md-2">
                <label class="form-label fw-semibold">Subject</label>
                <input type="text" class="form-control" id="q_subject" placeholder="e.g. Math">
            </div>
        </div>

        <!-- MCQ options -->
        <div id="mcqFields" class="row g-3 mt-1">
            <div class="col-md-6"><label class="form-label fw-semibold">Option A *</label><input type="text" class="form-control" id="q_a" placeholder="Option A"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Option B *</label><input type="text" class="form-control" id="q_b" placeholder="Option B"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Option C</label><input type="text" class="form-control" id="q_c" placeholder="Option C"></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Option D</label><input type="text" class="form-control" id="q_d" placeholder="Option D"></div>
            <div class="col-md-4">
                <label class="form-label fw-semibold">Correct Answer *</label>
                <select class="form-select" id="q_correct">
                    <option value="A">A</option><option value="B">B</option>
                    <option value="C">C</option><option value="D">D</option>
                </select>
            </div>
        </div>

        <!-- Coding fields -->
        <div id="codingFields" class="row g-3 mt-1" style="display:none;">
            <div class="col-12"><label class="form-label fw-semibold">Starter Code</label><textarea class="form-control" id="q_starter" rows="4" placeholder="def solution():&#10;    pass"></textarea></div>
            <div class="col-md-6"><label class="form-label fw-semibold">Expected Output (sample)</label><textarea class="form-control" id="q_expected" rows="2" placeholder="Expected output…"></textarea></div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button class="btn btn-primary fw-semibold" onclick="saveQuestion()">Save Question</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
let allQ = [];

async function loadQ() {
    const resp = await apiGet('/api/questions/list?limit=300');
    const data = await resp.json();
    allQ = data.questions || [];
    renderQ(allQ);
}

function filterQ() {
    const s = document.getElementById('searchQ').value.toLowerCase();
    const t = document.getElementById('typeFilter').value;
    const d = document.getElementById('diffFilter').value;
    renderQ(allQ.filter(q=>
        (!s||q.question_text.toLowerCase().includes(s)) &&
        (!t||q.question_type===t) && (!d||q.difficulty===d)
    ));
}

function renderQ(qs) {
    const div = document.getElementById('qTable');
    if (!qs.length) {
        div.innerHTML = '<div class="card-custom p-5 text-center"><i class="fas fa-inbox fa-3x text-muted mb-3"></i><p class="text-muted">No questions found.</p></div>';
        return;
    }
    div.innerHTML = `
    <div class="card-custom">
    <table class="table table-hover mb-0" style="font-size:.85rem;">
        <thead style="background:#f8fafc;"><tr>
            <th style="padding:12px 16px;">Question</th>
            <th>Type</th><th>Subject</th><th>Difficulty</th><th>Marks</th><th></th>
        </tr></thead>
        <tbody>${qs.map(q=>`
            <tr>
                <td style="padding:12px 16px;max-width:400px;"><div style="font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${q.question_text}</div></td>
                <td><span class="badge ${q.question_type==='mcq'?'bg-primary':'bg-warning text-dark'}">${q.question_type.toUpperCase()}</span></td>
                <td style="color:#64748b;">${q.subject||'—'}</td>
                <td><span style="font-size:.72rem;font-weight:600;color:${q.difficulty==='easy'?'#16a34a':q.difficulty==='hard'?'#dc2626':'#d97706'}">${q.difficulty}</span></td>
                <td style="font-weight:600;">${q.marks}</td>
                <td><button onclick="deleteQ(${q.id})" class="btn btn-sm btn-outline-danger" style="border-radius:7px;" title="Delete"><i class="fas fa-trash"></i></button></td>
            </tr>`).join('')}
        </tbody>
    </table>
    </div>`;
}

function openCreate() {
    document.getElementById('q_text').value=''; document.getElementById('q_type').value='mcq';
    document.getElementById('q_diff').value='medium'; document.getElementById('q_marks').value=1;
    document.getElementById('q_subject').value=''; document.getElementById('q_a').value='';
    document.getElementById('q_b').value=''; document.getElementById('q_c').value='';
    document.getElementById('q_d').value=''; document.getElementById('q_correct').value='A';
    document.getElementById('q_starter').value=''; document.getElementById('q_expected').value='';
    toggleQFields();
    new bootstrap.Modal(document.getElementById('qModal')).show();
}

function toggleQFields() {
    const t = document.getElementById('q_type').value;
    document.getElementById('mcqFields').style.display = t==='mcq' ? 'flex' : 'none';
    document.getElementById('codingFields').style.display = t==='coding' ? 'flex' : 'none';
}

async function saveQuestion() {
    const body = {
        question_text: document.getElementById('q_text').value.trim(),
        question_type: document.getElementById('q_type').value,
        difficulty: document.getElementById('q_diff').value,
        marks: parseInt(document.getElementById('q_marks').value)||1,
        subject: document.getElementById('q_subject').value||null,
    };
    if (!body.question_text) { showToast('Question text required','error'); return; }
    if (body.question_type==='mcq') {
        body.option_a=document.getElementById('q_a').value;
        body.option_b=document.getElementById('q_b').value;
        body.option_c=document.getElementById('q_c').value;
        body.option_d=document.getElementById('q_d').value;
        body.correct_answer=document.getElementById('q_correct').value;
    } else {
        body.starter_code=document.getElementById('q_starter').value;
        body.expected_output=document.getElementById('q_expected').value;
    }
    const resp = await apiPost('/api/questions/create', body);
    const data = await resp.json();
    if (resp.ok) {
        bootstrap.Modal.getInstance(document.getElementById('qModal'))?.hide();
        showToast('Question added!', 'success'); loadQ();
    } else showToast(data.detail||'Error', 'error');
}

async function deleteQ(id) {
    if (!confirm('Delete this question?')) return;
    const resp = await apiDelete(`/api/questions/${id}`);
    if (resp.ok) { showToast('Deleted','success'); loadQ(); }
}

document.addEventListener('DOMContentLoaded', loadQ);
</script>
{% endblock %}
