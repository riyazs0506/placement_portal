<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – Placement Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
    <style>
        *{box-sizing:border-box;margin:0;padding:0;}
        body{font-family:'Inter',sans-serif;background:#0f172a;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
        body::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(37,99,235,.15) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(124,58,237,.15) 0%,transparent 60%),radial-gradient(ellipse at 60% 80%,rgba(6,182,212,.1) 0%,transparent 60%);}
        .grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;}
        .login-wrap{position:relative;z-index:10;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:24px;overflow:hidden;backdrop-filter:blur(20px);box-shadow:0 32px 64px rgba(0,0,0,.5);width:420px;max-width:96vw;padding:40px 36px;}
        .brand-row{text-align:center;margin-bottom:28px;}
        .brand-icon{width:56px;height:56px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;margin-bottom:12px;}
        h1{font-family:'Space Grotesk',sans-serif;color:#fff;font-size:1.5rem;font-weight:700;margin-bottom:4px;}
        .sub{color:rgba(255,255,255,.45);font-size:.85rem;}
        .form-label{color:rgba(255,255,255,.7);font-size:.83rem;font-weight:500;margin-bottom:6px;}
        .form-control{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:10px;color:#fff;padding:11px 14px;font-size:.9rem;transition:border .2s;}
        .form-control:focus{background:rgba(255,255,255,.1);border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.2);color:#fff;outline:none;}
        .form-control::placeholder{color:rgba(255,255,255,.3);}
        .btn-login{width:100%;background:linear-gradient(135deg,#2563eb,#7c3aed);color:#fff;border:none;border-radius:10px;padding:12px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s;margin-top:6px;}
        .btn-login:hover{opacity:.9;transform:translateY(-1px);}
        .divider{text-align:center;color:rgba(255,255,255,.3);font-size:.8rem;margin:18px 0;position:relative;}
        .divider::before,.divider::after{content:'';position:absolute;top:50%;width:42%;height:1px;background:rgba(255,255,255,.12);}
        .divider::before{left:0;} .divider::after{right:0;}
        .reg-links{display:flex;flex-direction:column;gap:8px;}
        .reg-link{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:10px 14px;color:rgba(255,255,255,.7);text-decoration:none;font-size:.83rem;font-weight:500;transition:all .2s;}
        .reg-link:hover{background:rgba(255,255,255,.1);color:#fff;}
        .reg-link .icon{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.85rem;}
        .alert-box{background:rgba(239,68,68,.15);border:1px solid rgba(239,68,68,.4);border-radius:10px;color:#fca5a5;padding:10px 14px;font-size:.83rem;margin-bottom:16px;display:none;}
    </style>
</head>
<body>
<div class="grid-bg"></div>
<div class="login-wrap">
    <div class="brand-row">
        <div class="brand-icon"><i class="fas fa-graduation-cap text-white" style="font-size:22px;"></i></div>
        <h1>Placement Portal</h1>
        <p class="sub">University Campus Recruitment System</p>
    </div>

    <div class="alert-box" id="alertBox"></div>

    <div class="mb-3">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" placeholder="your@email.com" autocomplete="email">
    </div>
    <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" id="password" placeholder="Enter your password" autocomplete="current-password">
    </div>
    <button class="btn-login" onclick="doLogin()" id="loginBtn">
        <span id="loginText">Sign In</span>
        <span id="loginSpinner" style="display:none;"><i class="fas fa-spinner fa-spin"></i></span>
    </button>

    <div class="divider">New here? Register as</div>
    <div class="reg-links">
        <a href="/register" class="reg-link">
            <div class="icon" style="background:rgba(16,185,129,.2);color:#34d399;"><i class="fas fa-user-graduate"></i></div>
            Student — Register here (no key required)
        </a>
        <a href="/register/staff" class="reg-link">
            <div class="icon" style="background:rgba(37,99,235,.2);color:#60a5fa;"><i class="fas fa-chalkboard-teacher"></i></div>
            Staff / Placement Officer — Secret key required
        </a>
        <a href="/register/company" class="reg-link">
            <div class="icon" style="background:rgba(124,58,237,.2);color:#a78bfa;"><i class="fas fa-building"></i></div>
            Company / HR — Secret key required
        </a>
    </div>
</div>

<script>
async function doLogin() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const alertBox = document.getElementById('alertBox');
    alertBox.style.display = 'none';

    if (!email || !password) {
        alertBox.textContent = 'Please enter email and password.';
        alertBox.style.display = 'block';
        return;
    }

    document.getElementById('loginText').style.display = 'none';
    document.getElementById('loginSpinner').style.display = 'inline';
    document.getElementById('loginBtn').disabled = true;

    try {
        const resp = await fetch('/api/users/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        });
        const data = await resp.json();

        if (!resp.ok) {
            alertBox.textContent = data.detail || 'Login failed. Check your credentials.';
            alertBox.style.display = 'block';
        } else {
            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));
            window.location.href = '/dashboard';
        }
    } catch (e) {
        alertBox.textContent = 'Network error. Please try again.';
        alertBox.style.display = 'block';
    } finally {
        document.getElementById('loginText').style.display = 'inline';
        document.getElementById('loginSpinner').style.display = 'none';
        document.getElementById('loginBtn').disabled = false;
    }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

// Redirect if already logged in
if (localStorage.getItem('token')) window.location.href = '/dashboard';
</script>
</body>
</html>
