<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}University Placement Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% block body %}
<div class="sidebar" id="sidebar">
    <div class="brand">
        <div class="d-flex align-items-center gap-2 mb-1">
            <div style="width:34px;height:34px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:8px;display:flex;align-items:center;justify-content:center;">
                <i class="fas fa-graduation-cap text-white" style="font-size:14px;"></i>
            </div>
            <div>
                <h2 class="mb-0">Placement <span>Portal</span></h2>
                <div style="color:rgba(255,255,255,.4);font-size:.68rem;" id="userRoleBadge">Loading…</div>
            </div>
        </div>
    </div>
    <nav class="mt-2" id="sidebarNav"></nav>
    <div style="position:absolute;bottom:16px;left:0;right:0;padding:0 8px;">
        <a href="/notifications" class="nav-link" style="margin-bottom:4px;">
            <i class="fas fa-bell"></i> Notifications
            <span id="notifBadge" style="margin-left:auto;background:#ef4444;color:#fff;border-radius:10px;padding:1px 7px;font-size:.7rem;display:none;"></span>
        </a>
        <a href="#" onclick="logout()" class="nav-link" style="color:#f87171;">
            <i class="fas fa-sign-out-alt"></i> Logout
        </a>
    </div>
</div>

<div class="main-content">
    <div class="topbar">
        <div class="d-flex align-items-center gap-3">
            <button class="btn btn-sm d-md-none" onclick="document.getElementById('sidebar').classList.toggle('open')">
                <i class="fas fa-bars"></i>
            </button>
            <span class="page-title">{% block page_title %}Dashboard{% endblock %}</span>
        </div>
        <div class="d-flex align-items-center gap-3">
            <!-- Notification bell -->
            <div class="position-relative">
              <a href="/notifications" style="text-decoration:none;color:#475569;position:relative;display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:10px;background:#f1f5f9;transition:background .15s;" onmouseover="this.style.background='#e2e8f0'" onmouseout="this.style.background='#f1f5f9'">
                <i class="fas fa-bell" style="font-size:.9rem;"></i>
                <span id="notifBadge" style="display:none;position:absolute;top:-3px;right:-3px;background:#ef4444;color:#fff;border-radius:50%;width:16px;height:16px;font-size:.58rem;font-weight:700;display:flex;align-items:center;justify-content:center;"></span>
              </a>
            </div>
            <!-- User avatar with dropdown -->
            <div class="dropdown">
              <button class="d-flex align-items-center gap-2" style="background:none;border:none;cursor:pointer;padding:0;" data-bs-toggle="dropdown">
                <div id="topbarAvatar" style="width:36px;height:36px;background:linear-gradient(135deg,#2563eb,#7c3aed);border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;font-size:.82rem;" id="topbarAvatarInner">?</div>
                <div class="d-none d-md-block text-start">
                    <div id="topbarUserName" style="font-weight:600;font-size:.85rem;color:#0f172a;"></div>
                    <div id="topbarUserRole" style="font-size:.7rem;color:#64748b;"></div>
                </div>
                <i class="fas fa-chevron-down d-none d-md-block" style="font-size:.65rem;color:#94a3b8;"></i>
              </button>
              <ul class="dropdown-menu dropdown-menu-end" style="border-radius:12px;border:1px solid #e2e8f0;box-shadow:0 10px 30px rgba(0,0,0,.1);min-width:180px;padding:6px;">
                <li><a class="dropdown-item" href="/profile" style="border-radius:8px;font-size:.85rem;padding:8px 12px;"><i class="fas fa-user-circle me-2 text-primary"></i>My Profile</a></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="#" onclick="logout()" style="border-radius:8px;font-size:.85rem;padding:8px 12px;color:#ef4444;"><i class="fas fa-sign-out-alt me-2"></i>Logout</a></li>
              </ul>
            </div>
        </div>
    </div>
    <div class="content-area">
        {% block content %}{% endblock %}
    </div>
</div>
{% endblock %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/app.js"></script>
{% block extra_scripts %}{% endblock %}
<script>
    document.addEventListener('DOMContentLoaded', () => { if(typeof initApp==='function') initApp(); });
</script>
</body>
</html>
